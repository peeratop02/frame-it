name: FrameIt
options:
  bundleIdPrefix: com.peeratop02
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    # Swift 5 language mode: keeps the first build green by avoiding Swift 6
    # strict-concurrency churn around PhotoKit/ImageIO. async/await, @Observable,
    # and Sendable are all still usable. Revisit upgrading to Swift 6 later.
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    GENERATE_INFOPLIST_FILE: NO
    SWIFT_EMIT_LOC_STRINGS: YES

targets:
  FrameIt:
    type: application
    platform: iOS
    sources:
      - path: FrameIt
        excludes:
          - "Resources/Info.plist"
    settings:
      base:
        INFOPLIST_FILE: FrameIt/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.peeratop02.frameit
        PRODUCT_NAME: FrameIt
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1,2"

  FrameItTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FrameItTests
    dependencies:
      - target: FrameIt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peeratop02.frameit.tests
        GENERATE_INFOPLIST_FILE: YES

  FrameItUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FrameItUITests
    dependencies:
      - target: FrameIt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peeratop02.frameit.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: FrameIt

schemes:
  FrameIt:
    build:
      targets:
        FrameIt: all
        FrameItTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FrameItTests
        - FrameItUITests
